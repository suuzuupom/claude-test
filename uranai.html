<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星座トップ３占い</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #2c1a0e;
      --bg2: #3d2512;
      --surface: #4a2e18;
      --surface2: #5c3a20;
      --surface3: #6b4528;
      --card1: #7a5230;
      --text: #f5e6d3;
      --text-muted: #c9a882;
      --text-faint: #8a6a4a;
      --gold: #d4a843;
      --silver: #b0a090;
      --bronze: #c47a3a;
      --accent: #e8b86d;
      --accent2: #f0d4a0;
      --border: rgba(212, 168, 67, 0.2);
      --shadow: rgba(0, 0, 0, 0.5);
      --glow: rgba(212, 168, 67, 0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Kana', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
      min-height: 100vh;
      padding: 0 0 60px;
      overflow-x: hidden;
    }

    /* 星空背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(212,168,67,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(180,100,50,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: var(--accent2);
      animation: twinkle var(--dur) ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.3); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ヘッダー */
    header {
      text-align: center;
      padding: 40px 16px 24px;
    }

    .header-moon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
      animation: moonFloat 4s ease-in-out infinite;
    }

    @keyframes moonFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    h1 {
      font-size: 22px;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(212,168,67,0.4);
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    /* カテゴリタブ */
    .category-section {
      margin-bottom: 20px;
    }

    .category-label {
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-align: center;
    }

    .category-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }

    .category-scroll::-webkit-scrollbar { display: none; }

    .cat-btn {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }

    .cat-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .cat-btn.active {
      background: linear-gradient(135deg, var(--gold), #b8903a);
      border-color: var(--gold);
      color: #2c1a0e;
      font-weight: bold;
      box-shadow: 0 0 12px rgba(212,168,67,0.3);
    }

    /* メインカード */
    .main-card {
      background: linear-gradient(145deg, var(--surface), var(--surface2));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .theme-display {
      text-align: center;
      margin-bottom: 28px;
    }

    .theme-emoji {
      font-size: 36px;
      display: block;
      margin-bottom: 10px;
    }

    .theme-title {
      font-size: 18px;
      font-weight: bold;
      color: var(--accent2);
      line-height: 1.5;
      letter-spacing: 1px;
    }

    .theme-subtitle {
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 4px;
    }

    /* ランキングカード */
    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .rank-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
      animation: rankIn 0.5s ease both;
    }

    .rank-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.06;
      border-radius: 14px;
    }

    .rank-card.rank-1 {
      background: linear-gradient(135deg, rgba(212,168,67,0.15), rgba(212,168,67,0.05));
      border-color: rgba(212,168,67,0.35);
      animation-delay: 0.1s;
    }

    .rank-card.rank-1::before {
      background: var(--gold);
    }

    .rank-card.rank-2 {
      background: linear-gradient(135deg, rgba(176,160,144,0.15), rgba(176,160,144,0.05));
      border-color: rgba(176,160,144,0.3);
      animation-delay: 0.25s;
    }

    .rank-card.rank-2::before {
      background: var(--silver);
    }

    .rank-card.rank-3 {
      background: linear-gradient(135deg, rgba(196,122,58,0.15), rgba(196,122,58,0.05));
      border-color: rgba(196,122,58,0.3);
      animation-delay: 0.4s;
    }

    .rank-card.rank-3::before {
      background: var(--bronze);
    }

    @keyframes rankIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .rank-badge {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      position: relative;
    }

    .rank-1 .rank-badge {
      background: radial-gradient(circle, var(--gold), #a07820);
      box-shadow: 0 0 16px rgba(212,168,67,0.5);
    }

    .rank-2 .rank-badge {
      background: radial-gradient(circle, #c8beb4, #8a8078);
      box-shadow: 0 0 10px rgba(176,160,144,0.4);
    }

    .rank-3 .rank-badge {
      background: radial-gradient(circle, var(--bronze), #8a5020);
      box-shadow: 0 0 10px rgba(196,122,58,0.4);
    }

    .sign-info {
      flex: 1;
    }

    .sign-name-ja {
      font-size: 18px;
      font-weight: bold;
      color: var(--text);
      margin-bottom: 2px;
    }

    .sign-name-en {
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 1px;
    }

    .sign-symbol {
      font-size: 32px;
      flex-shrink: 0;
    }

    .rank-comment {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.4;
    }

    /* 占うボタン */
    .btn-section {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .btn-main {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn-main::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      border-radius: 14px;
    }

    .btn-divine {
      background: linear-gradient(135deg, #8b5e2a, var(--gold), #8b5e2a);
      background-size: 200% 100%;
      color: #2c1a0e;
      box-shadow: 0 4px 20px rgba(212,168,67,0.4);
    }

    .btn-divine:hover {
      background-position: 100% 0;
      box-shadow: 0 6px 28px rgba(212,168,67,0.6);
      transform: translateY(-2px);
    }

    .btn-divine:active {
      transform: translateY(0);
    }

    .btn-random {
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }

    .btn-random:hover {
      background: var(--surface2);
      color: var(--text);
    }

    /* テーマ一覧 */
    .all-themes {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .theme-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.25s;
      text-align: center;
    }

    .theme-item:hover {
      background: var(--surface2);
      border-color: rgba(212,168,67,0.3);
      transform: translateY(-1px);
    }

    .theme-item.active {
      border-color: var(--gold);
      background: rgba(212,168,67,0.08);
    }

    .theme-item-emoji {
      font-size: 20px;
      display: block;
      margin-bottom: 4px;
    }

    .theme-item-text {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* アニメーション */
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .loading .theme-title {
      background: linear-gradient(90deg, var(--text-faint), var(--accent), var(--text-faint));
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 1.5s linear infinite;
    }

    /* フッター */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--text-faint);
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* 区切り線 */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 20px 0;
    }

    /* スクロール用の追加装飾 */
    .scroll-hint {
      text-align: center;
      font-size: 10px;
      color: var(--text-faint);
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

      <div class="theme-title" id="themeTitle">占いボタンを押してみてね</div>
      <div class="theme-subtitle" id="themeSubtitle">あなたの星座は？</div>
    </div>

    <div class="ranking-list" id="rankingList">

        <span style="color:var(--text-faint); font-size:13px; letter-spacing:2px;">✦ ✦ ✦</span>
      </div>
    </div>
  </div>

  <!-- ボタン -->
  <div class="btn-section">
    <button class="btn-main btn-divine" id="btnDivine" onclick="divine()">
      ✨ 今すぐ占う ✨
    </button>
    <button class="btn-random" onclick="randomTheme()">
      🎲<br>ランダム

  </div>

  <div class="divider"></div>

  <!-- テーマ一覧 -->
  <div class="all-themes">
    <p class="section-title">— テーマ一覧 —</p>
    <div class="theme-grid" id="themeGrid"></div>
  </div>

  <footer>
    ✦ 占い結果はエンタメです ✦<br>
    どの星座も素敵な個性があります🌟
  </footer>
</div>

    { cat: 'personality', emoji: '😴', title: 'マイペースな星座', sub: '我が道を行くトップ３', comments: ['急かされても全く動じない','自分のペースを乱せば本領発揮できない','独自のリズムで着実に進む'] },

    // 日常・生活
    { cat: 'life', emoji: '🍳', title: '料理上手な星座', sub: 'キッチンのトップ３', comments: ['丁寧さと創造性のバランスが完璧','家族に「またこれ作って」と言われる','料理が愛情表現になっている'] },
    { cat: 'life', emoji: '🧹', title: 'きれい好きな星座', sub: '部屋が片付いているトップ３', comments: ['汚れが気になって放っておけない','整理整頓が快感になっている','清潔感が生き甲斐のひとつ'] },
    { cat: 'life', emoji: '🐌', title: 'ズボラな星座', sub: 'だらしないトップ３', comments: ['見えないところはとりあえず放置','「明日やろう」が口癖','でもいざとなったら一気にやり遂げる'] },
    { cat: 'life', emoji: '🌙', title: '夜型な星座', sub: '夜に輝くトップ３', comments: ['深夜に一番集中できる','日が沈むと元気になるタイプ','朝は人に話しかけないでほしい'] },

    { cat: 'life', emoji: '🏃', title: '行動力がある星座', sub: 'すぐ動くトップ３', comments: ['考えるより先に体が動く','チャンスを逃さない瞬発力','ただし計画性が少し足りない'] },

    { cat: 'life', emoji: '📱', title: 'SNS依存な星座', sub: 'スマホを手放せないトップ３', comments: ['通知が来ると即チェック','いいね数が気になって仕方ない','シェアしないと気が済まない'] },
  ];

  let currentTheme = null;
  let currentCat = 'all';
  let currentResult = null;

  // 星を生成
  function createStars() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      star.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        --dur: ${Math.random() * 3 + 2}s;
        animation-delay: ${Math.random() * 3}s;
      `;
      container.appendChild(star);
    }
  }

  // テーマグリッドを生成
  function renderThemeGrid() {
    const filtered = currentCat === 'all' ? themes : themes.filter(t => t.cat === currentCat);
    const grid = document.getElementById('themeGrid');
    grid.innerHTML = filtered.map((t, i) => `
      <div class="theme-item ${currentTheme === t ? 'active' : ''}" onclick="selectTheme(${themes.indexOf(t)})">
        <span class="theme-item-emoji">${t.emoji}</span>
        <div class="theme-item-text">${t.title}</div>
      </div>
    `).join('');
  }

  // カテゴリ変更
  document.getElementById('categoryScroll').addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderThemeGrid();
  });

  // テーマ選択
  function selectTheme(index) {
    currentTheme = themes[index];
    divine();
  }

  // ランダムテーマ
  function randomTheme() {
    const filtered = currentCat === 'all' ? themes : themes.filter(t => t.cat === currentCat);
    currentTheme = filtered[Math.floor(Math.random() * filtered.length)];
    divine();
  }

  // シャッフル
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // 占いメイン
  function divine() {
    if (!currentTheme) {
      randomTheme();
      return;
    }

    const theme = currentTheme;
    const top3 = shuffle(signs).slice(0, 3);

    // テーマ表示更新
    document.getElementById('themeEmoji').textContent = theme.emoji;
    document.getElementById('themeTitle').textContent = theme.title + ' トップ３';
    document.getElementById('themeSubtitle').textContent = theme.sub;

    // ランキング表示
    const medals = ['🥇', '🥈', '🥉'];
    const rankClasses = ['rank-1', 'rank-2', 'rank-3'];

    const list = document.getElementById('rankingList');
    list.innerHTML = top3.map((sign, i) => `
      <div class="rank-card ${rankClasses[i]}">
        <div class="rank-badge">${medals[i]}</div>
        <div class="sign-info">
          <div class="sign-name-ja">${sign.ja}</div>
          <div class="sign-name-en">${sign.en}</div>
          <div class="rank-comment">${theme.comments[i]}</div>
        </div>
        <div class="sign-symbol">${sign.symbol}</div>
      </div>
    `).join('');

    renderThemeGrid();

    // ボタンエフェクト
    const btn = document.getElementById('btnDivine');
    btn.textContent = '✨ もう一度占う ✨';
  }

  // 初期化
  createStars();
  renderThemeGrid();
</script>
