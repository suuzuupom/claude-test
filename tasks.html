<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家事タスク管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f7fafc;
      --text: #333333;
      --text-muted: #888888;
      --text-faint: #bbbbbb;
      --border: #e2e8f0;
      --shadow-sm: rgba(0,0,0,0.06);
      --shadow-md: rgba(0,0,0,0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1117;
        --surface: #1e2130;
        --surface2: #252a3a;
        --text: #e2e8f0;
        --text-muted: #8892a4;
        --text-faint: #4a5568;
        --border: #2d3748;
        --shadow-sm: rgba(0,0,0,0.3);
        --shadow-md: rgba(0,0,0,0.4);
      }
    }

    body.dark {
      --bg: #0f1117;
      --surface: #1e2130;
      --surface2: #252a3a;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --text-faint: #4a5568;
      --border: #2d3748;
      --shadow-sm: rgba(0,0,0,0.3);
      --shadow-md: rgba(0,0,0,0.4);
    }

    body.light {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f7fafc;
      --text: #333333;
      --text-muted: #888888;
      --text-faint: #bbbbbb;
      --border: #e2e8f0;
      --shadow-sm: rgba(0,0,0,0.06);
      --shadow-md: rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
      transition: background 0.3s, color 0.3s;
    }

    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px 16px 16px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      position: relative;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    header p {
      font-size: 0.8rem;
      opacity: 0.85;
      margin-top: 4px;
    }

    .dark-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 20px;
      padding: 6px 12px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dark-toggle:active { background: rgba(255,255,255,0.35); }

    .add-form {
      background: var(--surface);
      margin: 16px;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 8px var(--shadow-md);
    }

    .add-form h2 {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .form-row input[type="text"] {
      flex: 1;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      background: var(--surface2);
      color: var(--text);
      transition: border-color 0.2s, background 0.3s;
    }

    .form-row input[type="text"]::placeholder { color: var(--text-faint); }

    .form-row input[type="text"]:focus {
      border-color: #667eea;
      background: var(--surface);
    }

    .category-select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      background: var(--surface2);
      outline: none;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s, background 0.3s;
    }

    .category-select:focus {
      border-color: #667eea;
      background: var(--surface);
    }

    .btn-add {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      line-height: 1;
    }

    .btn-add:active {
      opacity: 0.85;
      transform: scale(0.96);
    }

    .filter-tabs {
      display: flex;
      gap: 8px;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
      margin-bottom: 8px;
    }

    .filter-tabs::-webkit-scrollbar { display: none; }

    .filter-tab {
      white-space: nowrap;
      padding: 7px 14px;
      border-radius: 20px;
      border: none;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      background: var(--surface);
      color: var(--text-muted);
      box-shadow: 0 1px 4px var(--shadow-sm);
      transition: all 0.2s;
    }

    .filter-tab.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 2px 8px rgba(102,126,234,0.4);
    }

    .stats {
      display: flex;
      gap: 10px;
      margin: 12px 16px;
    }

    .stat-card {
      flex: 1;
      background: var(--surface);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      box-shadow: 0 1px 4px var(--shadow-sm);
    }

    .stat-card .num {
      font-size: 1.5rem;
      font-weight: 700;
      color: #667eea;
    }

    .stat-card .label {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .task-list {
      margin: 0 16px;
    }

    .category-group {
      margin-bottom: 16px;
    }

    .category-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .category-label span.dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .task-item {
      background: var(--surface);
      border-radius: 12px;
      padding: 14px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px var(--shadow-sm);
      transition: opacity 0.2s, transform 0.2s, background 0.3s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item.done {
      opacity: 0.5;
    }

    .task-item.done .task-name {
      text-decoration: line-through;
      color: var(--text-faint);
    }

    .check-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .task-item.done .check-btn {
      background: #667eea;
      border-color: #667eea;
      color: white;
    }

    .task-name {
      flex: 1;
      font-size: 0.97rem;
      color: var(--text);
      line-height: 1.4;
    }

    .task-category-badge {
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .btn-delete {
      background: none;
      border: none;
      color: var(--text-faint);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
      line-height: 1;
    }

    .btn-delete:active { color: #e53e3e; }

    .empty {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-faint);
      font-size: 0.95rem;
    }

    .empty .icon { font-size: 3rem; margin-bottom: 12px; }

    /* カテゴリカラー */
    .cat-cleaning  { background: #ebf8ff; color: #2b6cb0; }
    .cat-laundry   { background: #e0f7fa; color: #00796b; }
    .cat-cooking   { background: #fff3e0; color: #e65100; }
    .cat-shopping  { background: #fce4ec; color: #c2185b; }
    .cat-childcare { background: #f3e5f5; color: #7b1fa2; }
    .cat-other     { background: #f5f5f5; color: #616161; }

    .dot-cleaning  { background: #2b6cb0; }
    .dot-laundry   { background: #00796b; }
    .dot-cooking   { background: #e65100; }
    .dot-shopping  { background: #c2185b; }
    .dot-childcare { background: #7b1fa2; }
    .dot-other     { background: #616161; }
  </style>
</head>
<body>

<header>
  <h1>家事タスク管理</h1>
  <p id="date-display"></p>
  <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()" title="ダークモード切替">🌙</button>
</header>

<div class="add-form">
  <h2>タスクを追加</h2>
  <div class="form-row">
    <input type="text" id="task-input" placeholder="例：洗い物をする" maxlength="50">
    <button class="btn-add" onclick="addTask()">＋</button>
  </div>
  <select class="category-select" id="category-select">
    <option value="cleaning">🧹 掃除</option>
    <option value="laundry">👕 洗濯</option>
    <option value="cooking">🍳 料理</option>
    <option value="shopping">🛒 買い物</option>
    <option value="childcare">👶 育児</option>
    <option value="other">📝 その他</option>
  </select>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="num" id="stat-total">0</div>
    <div class="label">合計</div>
  </div>
  <div class="stat-card">
    <div class="num" id="stat-done">0</div>
    <div class="label">完了</div>
  </div>
  <div class="stat-card">
    <div class="num" id="stat-remaining">0</div>
    <div class="label">残り</div>
  </div>
</div>

<div class="filter-tabs" id="filter-tabs">
  <button class="filter-tab active" data-filter="all" onclick="setFilter('all', this)">すべて</button>
  <button class="filter-tab" data-filter="remaining" onclick="setFilter('remaining', this)">未完了</button>
  <button class="filter-tab" data-filter="done" onclick="setFilter('done', this)">完了済み</button>
  <button class="filter-tab" data-filter="cleaning" onclick="setFilter('cleaning', this)">🧹 掃除</button>
  <button class="filter-tab" data-filter="laundry" onclick="setFilter('laundry', this)">👕 洗濯</button>
  <button class="filter-tab" data-filter="cooking" onclick="setFilter('cooking', this)">🍳 料理</button>
  <button class="filter-tab" data-filter="shopping" onclick="setFilter('shopping', this)">🛒 買い物</button>
  <button class="filter-tab" data-filter="childcare" onclick="setFilter('childcare', this)">👶 育児</button>
  <button class="filter-tab" data-filter="other" onclick="setFilter('other', this)">📝 その他</button>
</div>

<div class="task-list" id="task-list"></div>

<script>
  const CATEGORIES = {
    cleaning:  { label: '掃除',   icon: '🧹' },
    laundry:   { label: '洗濯',   icon: '👕' },
    cooking:   { label: '料理',   icon: '🍳' },
    shopping:  { label: '買い物', icon: '🛒' },
    childcare: { label: '育児',   icon: '👶' },
    other:     { label: 'その他', icon: '📝' },
  };

  let tasks = JSON.parse(localStorage.getItem('household-tasks') || '[]');
  let currentFilter = 'all';

  function save() {
    localStorage.setItem('household-tasks', JSON.stringify(tasks));
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const category = document.getElementById('category-select').value;
    tasks.unshift({ id: Date.now(), name, category, done: false });
    save();
    render();
    input.value = '';
    input.focus();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function getFiltered() {
    if (currentFilter === 'all') return tasks;
    if (currentFilter === 'done') return tasks.filter(t => t.done);
    if (currentFilter === 'remaining') return tasks.filter(t => !t.done);
    return tasks.filter(t => t.category === currentFilter);
  }

  function render() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-remaining').textContent = total - done;

    const filtered = getFiltered();
    const list = document.getElementById('task-list');

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="icon">${currentFilter === 'done' ? '🎉' : '📋'}</div>
          <div>${currentFilter === 'done' ? '完了したタスクはありません' : 'タスクを追加しましょう！'}</div>
        </div>`;
      return;
    }

    // カテゴリでグループ化 (all系フィルター時のみ)
    const groupByCategory = ['all', 'remaining', 'done'].includes(currentFilter);

    if (groupByCategory) {
      const groups = {};
      filtered.forEach(t => {
        if (!groups[t.category]) groups[t.category] = [];
        groups[t.category].push(t);
      });
      list.innerHTML = Object.entries(groups).map(([cat, items]) => `
        <div class="category-group">
          <div class="category-label">
            <span class="dot dot-${cat}"></span>
            ${CATEGORIES[cat].icon} ${CATEGORIES[cat].label}
          </div>
          ${items.map(t => taskHTML(t)).join('')}
        </div>
      `).join('');
    } else {
      list.innerHTML = filtered.map(t => taskHTML(t)).join('');
    }
  }

  function taskHTML(t) {
    return `
      <div class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
        <button class="check-btn" onclick="toggleTask(${t.id})">
          ${t.done ? '✓' : ''}
        </button>
        <span class="task-name">${escapeHtml(t.name)}</span>
        <span class="task-category-badge cat-${t.category}">
          ${CATEGORIES[t.category].icon}
        </span>
        <button class="btn-delete" onclick="deleteTask(${t.id})">✕</button>
      </div>`;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter キーで追加
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // 日付表示
  const d = new Date();
  document.getElementById('date-display').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;

  // ダークモード
  function applyTheme(dark) {
    document.body.classList.toggle('dark', dark);
    document.body.classList.toggle('light', !dark);
    document.getElementById('dark-toggle').textContent = dark ? '☀️' : '🌙';
  }

  function toggleDark() {
    const isDark = document.body.classList.contains('dark');
    const next = !isDark;
    localStorage.setItem('theme', next ? 'dark' : 'light');
    applyTheme(next);
  }

  // 初期テーマ: localStorageを優先、次にOSの設定
  (function initTheme() {
    const saved = localStorage.getItem('theme');
    if (saved) {
      applyTheme(saved === 'dark');
    } else {
      applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
    }
  })();

  render();
</script>
</body>
</html>
