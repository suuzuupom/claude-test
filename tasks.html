<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家事チェックリスト</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f7fafc;
      --text: #333333;
      --text-muted: #888888;
      --text-faint: #bbbbbb;
      --border: #e2e8f0;
      --shadow-sm: rgba(0,0,0,0.06);
      --shadow-md: rgba(0,0,0,0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1117;
        --surface: #1e2130;
        --surface2: #252a3a;
        --text: #e2e8f0;
        --text-muted: #8892a4;
        --text-faint: #4a5568;
        --border: #2d3748;
        --shadow-sm: rgba(0,0,0,0.3);
        --shadow-md: rgba(0,0,0,0.4);
      }
    }

    body.dark {
      --bg: #0f1117;
      --surface: #1e2130;
      --surface2: #252a3a;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --text-faint: #4a5568;
      --border: #2d3748;
      --shadow-sm: rgba(0,0,0,0.3);
      --shadow-md: rgba(0,0,0,0.4);
    }

    body.light {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f7fafc;
      --text: #333333;
      --text-muted: #888888;
      --text-faint: #bbbbbb;
      --border: #e2e8f0;
      --shadow-sm: rgba(0,0,0,0.06);
      --shadow-md: rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
      transition: background 0.3s, color 0.3s;
    }

    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px 16px 16px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      position: relative;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .date-display {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-top: 6px;
      font-weight: 500;
    }

    .dark-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 20px;
      padding: 6px 12px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dark-toggle:active { background: rgba(255,255,255,0.35); }

    .progress-bar-wrap {
      margin: 16px 16px 8px;
      background: var(--surface);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 8px var(--shadow-md);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .progress-header .label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .progress-header .count {
      font-size: 1rem;
      font-weight: 700;
      color: #667eea;
    }

    .bar-bg {
      height: 10px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .reset-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 8px 16px 16px;
      padding: 12px;
      background: var(--surface);
      color: var(--text-muted);
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:active {
      background: var(--surface2);
      color: #e53e3e;
      border-color: #e53e3e;
    }

    .task-list {
      margin: 0 16px;
    }

    .task-item {
      background: var(--surface);
      border-radius: 14px;
      padding: 16px 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 1px 4px var(--shadow-sm);
      transition: opacity 0.3s, background 0.3s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .task-item:active {
      transform: scale(0.98);
    }

    .task-item.done {
      opacity: 0.45;
    }

    .task-item.done .task-name {
      text-decoration: line-through;
      color: var(--text-faint);
    }

    .check-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2.5px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .task-item.done .check-circle {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
      color: white;
    }

    .task-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }

    .task-name {
      flex: 1;
      font-size: 1rem;
      color: var(--text);
      line-height: 1.4;
    }

    .complete-banner {
      display: none;
      text-align: center;
      padding: 24px 16px;
      animation: popIn 0.4s ease;
    }

    .complete-banner.show { display: block; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .complete-banner .big-icon { font-size: 3.5rem; margin-bottom: 8px; }
    .complete-banner .msg { font-size: 1.1rem; font-weight: 700; color: #667eea; }
    .complete-banner .sub { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>

<header>
  <h1>🏠 家事チェックリスト</h1>
  <div class="date-display" id="date-display"></div>
  <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()">🌙</button>
</header>

<div class="progress-bar-wrap">
  <div class="progress-header">
    <span class="label">今日の進捗</span>
    <span class="count"><span id="done-count">0</span> / <span id="total-count">0</span> 完了</span>
  </div>
  <div class="bar-bg">
    <div class="bar-fill" id="bar-fill" style="width:0%"></div>
  </div>
</div>

<div class="task-list" id="task-list"></div>

<div class="complete-banner" id="complete-banner">
  <div class="big-icon">🎉</div>
  <div class="msg">全部完了！お疲れさまでした</div>
  <div class="sub">今日の家事はすべて終わりました</div>
</div>

<button class="reset-btn" onclick="resetTasks()">🔄 チェックをリセット</button>

<script>
  const TASKS = [
    { id: 'dishes',    name: 'お皿洗い',           icon: '🍽️' },
    { id: 'vacuum',    name: '掃除機掛け',           icon: '🧹' },
    { id: 'bath',      name: 'お風呂場掃除',         icon: '🛁' },
    { id: 'hang',      name: '洗濯物干し',           icon: '👕' },
    { id: 'wash',      name: '洗濯物を回す',         icon: '🌀' },
    { id: 'fold',      name: '洗濯物を畳む',         icon: '👗' },
    { id: 'entrance',  name: '玄関のたたきを掃除する', icon: '🚪' },
    { id: 'toilet',    name: 'トイレ掃除',           icon: '🚽' },
    { id: 'wipe',      name: '床拭き',               icon: '🧽' },
  ];

  const TODAY = todayKey();

  function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  }

  function loadState() {
    const saved = JSON.parse(localStorage.getItem('checklist-state') || '{}');
    // 日付が変わっていたらリセット
    if (saved.date !== TODAY) {
      return { date: TODAY, done: {} };
    }
    return saved;
  }

  let state = loadState();

  function save() {
    localStorage.setItem('checklist-state', JSON.stringify(state));
  }

  function toggleTask(id) {
    state.done[id] = !state.done[id];
    save();
    render();
  }

  function resetTasks() {
    state.done = {};
    save();
    render();
  }

  function render() {
    const doneCount = TASKS.filter(t => state.done[t.id]).length;
    const total = TASKS.length;

    document.getElementById('done-count').textContent = doneCount;
    document.getElementById('total-count').textContent = total;
    document.getElementById('bar-fill').style.width = (doneCount / total * 100) + '%';

    const list = document.getElementById('task-list');
    list.innerHTML = TASKS.map(t => {
      const done = !!state.done[t.id];
      return `
        <div class="task-item ${done ? 'done' : ''}" onclick="toggleTask('${t.id}')">
          <div class="check-circle">${done ? '✓' : ''}</div>
          <span class="task-icon">${t.icon}</span>
          <span class="task-name">${t.name}</span>
        </div>`;
    }).join('');

    const banner = document.getElementById('complete-banner');
    banner.classList.toggle('show', doneCount === total);
  }

  // 日付表示
  (function setDate() {
    const d = new Date();
    const week = ['日', '月', '火', '水', '木', '金', '土'];
    document.getElementById('date-display').textContent =
      `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${week[d.getDay()]}）`;
  })();

  // ダークモード
  function applyTheme(dark) {
    document.body.classList.toggle('dark', dark);
    document.body.classList.toggle('light', !dark);
    document.getElementById('dark-toggle').textContent = dark ? '☀️' : '🌙';
  }

  function toggleDark() {
    const isDark = document.body.classList.contains('dark');
    const next = !isDark;
    localStorage.setItem('theme', next ? 'dark' : 'light');
    applyTheme(next);
  }

  (function initTheme() {
    const saved = localStorage.getItem('theme');
    if (saved) {
      applyTheme(saved === 'dark');
    } else {
      applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
    }
  })();

  render();
</script>
</body>
</html>
